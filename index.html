<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Tukang - Gaji Mingguan (Minggu-Minggu)</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { background: #f0f4f8; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        .header { background: #0f3b2c; color: white; padding: 20px; border-radius: 28px; margin-bottom: 20px; }
        .flex { display: flex; flex-wrap: wrap; gap: 20px; }
        .panel { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .panel-left { flex: 1.2; min-width: 260px; }
        .panel-right { flex: 2.5; min-width: 500px; overflow-x: auto; }
        input, button { padding: 10px; border-radius: 40px; border: 1px solid #ccc; margin: 5px 0; width: 100%; }
        button { background: #2b7a4b; color: white; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #1e5a3a; }
        .btn-secondary { background: #475569; }
        .btn-secondary:hover { background: #334155; }
        .worker-item { background: #f8fafc; margin: 8px 0; padding: 10px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #ddd; padding: 8px; text-align: center; }
        th:first-child, td:first-child { text-align: left; }
        .rekap { background: #fefce8; margin-top: 20px; padding: 15px; border-radius: 20px; }
        .api-box { margin-top: 20px; border-top: 2px dashed #ccc; padding-top: 15px; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; color: white; padding: 12px 24px; border-radius: 40px; opacity: 0; transition: 0.2s; z-index: 1000; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .btn-group button { flex: 1; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🧑‍🏗️ Absensi & Gaji Tukang</h1>
        <p>By. Aziz Fathunaim</p>
        <p>https://script.google.com/macros/s/AKfycbwrgDBSQp1LJIzkPv8Je4fqOIq1r7hiAuzuWRPb8JlVQjwgf5WPyULgjaltE1Iw68Yqdw/exec</p>
    </div>
    <div class="flex">
        <div class="panel panel-left">
            <h3>➕ Data Tukang</h3>
            <input type="text" id="nama" placeholder="Nama Tukang"><br>
            <input type="text" id="jabatan" placeholder="Jabatan"><br>
            <input type="number" id="upah" placeholder="Upah per hari (Rp)"><br>
            <button id="btnTambah">Tambah Tukang</button>
            <div id="listTukang" style="margin-top: 20px;"></div>
        </div>
        <div class="panel panel-right">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <h3>📅 Rekap Absensi</h3>
                <div class="week-nav">
                    <button id="prevWeek" class="btn-secondary">◀ Minggu Lalu</button>
                    <button id="nextWeek" class="btn-secondary">Minggu Depan ▶</button>
                    <button id="todayWeek" class="btn-secondary">Minggu Ini</button>
                </div>
            </div>
            <div id="weekRange" style="margin: 10px 0; font-weight: bold;"></div>
            <div style="overflow-x: auto;">
                <table id="tabelAbsensi">
                    <thead id="theadAbsensi"></thead>
                    <tbody id="tbodyAbsensi"></tbody>
                </table>
            </div>
            <div class="btn-group">
                <button id="simpanAbsensi">💾 Simpan Absensi </button>
            </div>
            <div class="rekap">
                <h3>📋 Rekapitulasi</h3>
                <table style="width:100%"><thead><th>Nama</th><th>Hadir (hari)</th><th>Gaji (Rp)</th></thead><tbody id="rekapBody"></tbody>
                <div id="totalGaji" style="text-align:right; font-weight:bold; margin-top:10px;"></div>
            </div>
            <div class="api-box">
                <h3>🌐 Upload ke Spreadsheet</h3>
                <input type="text" id="apiUrl" placeholder="Masukkan URL Web App Google Apps Script" style="font-family: monospace;">
                <button id="simpanUrl">Simpan URL</button>
                <button id="kirimSpreadsheet" style="background:#2563eb;">📤 Submit</button>
                <div id="statusApi" style="margin-top: 8px; font-size: 0.8rem;"></div>
            </div>
        </div>
    </div>
</div>
<div id="toast" class="toast">✔️ Tersimpan</div>

<script>
    // ========== DATA STORAGE ==========
    let workers = [];
    let attendanceDB = {};
    let currentWeekStart = "";
    let currentAttendance = {};
    let apiEndpoint = localStorage.getItem("apiUrl") || "";

    function formatYMD(d) { 
        let date = new Date(d); 
        return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`; 
    }
    
    function getStartOfWeek(date) {
        let d = new Date(date);
        const day = d.getDay(); // 0 = Minggu
        d.setDate(d.getDate() - day);
        return formatYMD(d);
    }
    
    function getWeekDates(weekStart) {
        let dates = [];
        let start = new Date(weekStart);
        for (let i = 0; i < 7; i++) {
            let d = new Date(start);
            d.setDate(start.getDate() + i);
            dates.push(formatYMD(d));
        }
        return dates;
    }
    
    function formatRange(ws) {
        let dates = getWeekDates(ws);
        let s = new Date(dates[0]);
        let e = new Date(dates[6]);
        return `${s.toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'short', year:'numeric' })} - ${e.toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'short', year:'numeric' })}`;
    }
    
    function numberFormat(n) { return new Intl.NumberFormat('id-ID').format(n); }
    function showToast(msg) { let t = document.getElementById("toast"); t.innerText = msg; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 2000); }

    function loadWorkers() { 
        let w = localStorage.getItem("workers"); 
        if(w) workers = JSON.parse(w); 
        else workers = [{id:"w1", name:"Slamet", position:"Tukang Kayu", dailyWage:150000}]; 
    }
    function saveWorkers() { localStorage.setItem("workers", JSON.stringify(workers)); }
    function loadAttendance() { 
        let a = localStorage.getItem("attendance"); 
        if(a) attendanceDB = JSON.parse(a); 
        else attendanceDB = {}; 
    }
    function saveAttendance() { localStorage.setItem("attendance", JSON.stringify(attendanceDB)); }
    
    function syncCurrentWeek() {
        if (!currentWeekStart) return;
        let dates = getWeekDates(currentWeekStart);
        let newAtt = { ...currentAttendance };
        workers.forEach(w => {
            if (!newAtt[w.id]) newAtt[w.id] = {};
            dates.forEach(d => {
                if (typeof newAtt[w.id][d] !== 'boolean') newAtt[w.id][d] = false;
            });
            Object.keys(newAtt[w.id]).forEach(date => {
                if (!dates.includes(date)) delete newAtt[w.id][date];
            });
        });
        Object.keys(newAtt).forEach(wid => {
            if (!workers.some(w => w.id === wid)) delete newAtt[wid];
        });
        currentAttendance = newAtt;
    }

    function loadCurrentWeekAttendance() {
        if (!currentWeekStart) return;
        let saved = attendanceDB[currentWeekStart] || {};
        currentAttendance = saved;
        syncCurrentWeek();
    }

    function saveCurrentWeek() {
        if (!currentWeekStart) return;
        let toSave = {};
        workers.forEach(w => {
            if (currentAttendance[w.id]) toSave[w.id] = { ...currentAttendance[w.id] };
        });
        attendanceDB[currentWeekStart] = toSave;
        saveAttendance();
        showToast("Absensi minggu ini tersimpan di browser");
    }

    function setWeek(weekStart) {
        currentWeekStart = weekStart;
        loadCurrentWeekAttendance();
        renderTable();
        renderRekap();
        document.getElementById("weekRange").innerText = formatRange(currentWeekStart);
    }

    function renderTable() {
        if (!currentWeekStart) return;
        let dates = getWeekDates(currentWeekStart);
        let thead = `<tr><th>Nama / Jabatan</th>` + 
            dates.map(d => `<th>${new Date(d).toLocaleDateString('id-ID', { weekday:'short', day:'numeric' })}</th>`).join('') + 
            `</tr>`;
        document.getElementById("theadAbsensi").innerHTML = thead;
        
        if (workers.length === 0) {
            document.getElementById("tbodyAbsensi").innerHTML = `<tr><td colspan="8">Belum ada tukang</td></tr>`;
            return;
        }
        
        let tbody = "";
        workers.forEach(w => {
            let att = currentAttendance[w.id] || {};
            tbody += `<tr>
                <td style="text-align:left"><b>${w.name}</b><br><small>${w.position}<br>Rp ${numberFormat(w.dailyWage)}/hari</small></td>`;
            dates.forEach(d => {
                let checked = att[d] === true;
                tbody += `<td><input type="checkbox" class="absensi-cb" data-wid="${w.id}" data-date="${d}" ${checked ? "checked" : ""}></td>`;
            });
            tbody += `</tr>`;
        });
        document.getElementById("tbodyAbsensi").innerHTML = tbody;
        
        document.querySelectorAll(".absensi-cb").forEach(cb => {
            cb.addEventListener("change", () => {
                let wid = cb.dataset.wid;
                let date = cb.dataset.date;
                if (!currentAttendance[wid]) currentAttendance[wid] = {};
                currentAttendance[wid][date] = cb.checked;
                renderRekap();
            });
        });
    }

    function renderRekap() {
        if (!currentWeekStart || workers.length === 0) return;
        let dates = getWeekDates(currentWeekStart);
        let totalSemua = 0;
        let html = "";
        workers.forEach(w => {
            let hadir = dates.filter(d => currentAttendance[w.id]?.[d] === true).length;
            let gaji = hadir * w.dailyWage;
            totalSemua += gaji;
            html += `<tr><td style="text-align:left">${w.name}</td><td>${hadir} hari</td><td>Rp ${numberFormat(gaji)}</td></tr>`;
        });
        document.getElementById("rekapBody").innerHTML = html;
        document.getElementById("totalGaji").innerHTML = `💰 Total: Rp ${numberFormat(totalSemua)}`;
    }

    function renderWorkerList() {
        let container = document.getElementById("listTukang");
        if (workers.length === 0) { container.innerHTML = "<div>Belum ada tukang</div>"; return; }
        let html = "";
        workers.forEach(w => {
            html += `<div class="worker-item">
                <div><b>${w.name}</b><br><small>${w.position} - Rp ${numberFormat(w.dailyWage)}</small></div>
                <button class="hapusTukang" data-id="${w.id}" style="background:#b91c1c; width:auto; padding:6px 12px;">Hapus</button>
            </div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll(".hapusTukang").forEach(btn => {
            btn.addEventListener("click", () => {
                let id = btn.dataset.id;
                if (confirm("Hapus tukang? Semua data absensi akan hilang.")) {
                    workers = workers.filter(w => w.id !== id);
                    saveWorkers();
                    for (let wk in attendanceDB) delete attendanceDB[wk][id];
                    saveAttendance();
                    loadCurrentWeekAttendance();
                    syncCurrentWeek();
                    renderWorkerList();
                    renderTable();
                    renderRekap();
                    showToast("Tukang dihapus");
                }
            });
        });
    }

    function addWorker(name, pos, wage) {
        if (!name.trim()) { alert("Nama harus diisi"); return false; }
        if (!pos.trim()) { alert("Jabatan harus diisi"); return false; }
        let w = Number(wage);
        if (isNaN(w) || w <= 0) { alert("Upah harus angka positif"); return false; }
        let newId = "w" + Date.now() + "-" + Math.random().toString(36).substr(2, 5);
        workers.push({ id: newId, name: name.trim(), position: pos.trim(), dailyWage: w });
        saveWorkers();
        renderWorkerList();
        if (currentWeekStart) {
            loadCurrentWeekAttendance();
            syncCurrentWeek();
            renderTable();
            renderRekap();
        }
        showToast("Tukang ditambahkan");
        return true;
    }

    // ========== KIRIM REKAP PER TUKANG PER MINGGU (DENGAN KOLOM PER HARI) ==========
    async function kirimKeSpreadsheet() {
        if (!apiEndpoint) { alert("Simpan URL Web App terlebih dahulu."); return; }
        if (!currentWeekStart || workers.length === 0) { alert("Tidak ada data."); return; }
        
        let dates = getWeekDates(currentWeekStart); // [Minggu, Senin, Selasa, Rabu, Kamis, Jumat, Sabtu]
        let namaHari = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        let statusDiv = document.getElementById("statusApi");
        statusDiv.innerHTML = "Mengirim rekap per tukang...";
        let berhasil = 0;
        let gagal = 0;
        const timestamp = new Date().toISOString();
        const tanggalExport = new Date().toLocaleDateString('id-ID');
        
        for (let w of workers) {
            // Siapkan status hadir untuk masing-masing hari
            let statusHari = [];
            let jumlahHadir = 0;
            for (let i = 0; i < dates.length; i++) {
                let hadir = currentAttendance[w.id]?.[dates[i]] === true;
                statusHari.push(hadir ? "Hadir" : "Tidak");
                if (hadir) jumlahHadir++;
            }
            const totalUpah = jumlahHadir * w.dailyWage;
            
            const payload = {
                timestamp: timestamp,
                tanggalExport: tanggalExport,
                namaTukang: w.name,
                jabatan: w.position,
                minggu: statusHari[0],   // Hari Minggu
                senin: statusHari[1],
                selasa: statusHari[2],
                rabu: statusHari[3],
                kamis: statusHari[4],
                jumat: statusHari[5],
                sabtu: statusHari[6],
                jumlahAbsen: jumlahHadir,
                upahPerHari: w.dailyWage,
                totalUpah: totalUpah,
                mingguMulai: currentWeekStart
            };
            
            try {
                await fetch(apiEndpoint, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                berhasil++;
            } catch(e) {
                console.error(e);
                gagal++;
            }
        }
        
        statusDiv.innerHTML = `✅ ${berhasil} data tukang berhasil dikirim, ❌ ${gagal} gagal. Cek spreadsheet.`;
        if (berhasil > 0) showToast("Rekap per tukang dikirim ke spreadsheet");
    }

    // Inisialisasi
    function init() {
        loadWorkers();
        loadAttendance();
        let todayStart = getStartOfWeek(new Date());
        setWeek(todayStart);
        renderWorkerList();
        
        document.getElementById("btnTambah").onclick = () => {
            let n = document.getElementById("nama").value;
            let p = document.getElementById("jabatan").value;
            let u = document.getElementById("upah").value;
            if (addWorker(n, p, u)) {
                document.getElementById("nama").value = "";
                document.getElementById("jabatan").value = "";
                document.getElementById("upah").value = "";
            }
        };
        document.getElementById("simpanAbsensi").onclick = () => saveCurrentWeek();
        document.getElementById("prevWeek").onclick = () => {
            let d = new Date(currentWeekStart);
            d.setDate(d.getDate() - 7);
            setWeek(getStartOfWeek(d));
        };
        document.getElementById("nextWeek").onclick = () => {
            let d = new Date(currentWeekStart);
            d.setDate(d.getDate() + 7);
            setWeek(getStartOfWeek(d));
        };
        document.getElementById("todayWeek").onclick = () => setWeek(getStartOfWeek(new Date()));
        document.getElementById("simpanUrl").onclick = () => {
            let url = document.getElementById("apiUrl").value.trim();
            if (url) {
                localStorage.setItem("apiUrl", url);
                apiEndpoint = url;
                showToast("URL disimpan");
            }
        };
        document.getElementById("kirimSpreadsheet").onclick = kirimKeSpreadsheet;
        document.getElementById("apiUrl").value = apiEndpoint;
    }
    init();
</script>
</body>
</html>
